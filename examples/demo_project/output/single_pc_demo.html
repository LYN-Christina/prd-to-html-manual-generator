<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>单 PC 端操作页示例</title>
  <style>
    :root {
      --blue: #1456b8;
      --deep: #0f2747;
      --muted: #6b7280;
      --bg: #eef3f8;
      --card: #ffffff;
      --line: #d8e1ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: #1f2937;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }
    .page {
      width: 1600px;
      height: 900px;
      margin: 28px auto;
      padding: 48px 56px;
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      border-radius: 24px;
      box-shadow: 0 12px 36px rgba(15, 39, 71, .12);
      position: relative;
      overflow: hidden;
    }
    .page::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 9px;
      background: linear-gradient(90deg, var(--blue), #26a7df);
    }
    h1 {
      margin: 0;
      color: var(--deep);
      font-size: 34px;
      line-height: 1.25;
    }
    .role {
      position: absolute;
      top: 46px;
      right: 56px;
      padding: 8px 18px;
      border-radius: 999px;
      color: var(--blue);
      background: #eaf2ff;
      font-size: 20px;
      font-weight: 700;
    }
    .pc-layout {
      margin-top: 28px;
      height: 640px;
      display: grid;
      grid-template-columns: 1fr;
    }
    .shot-card {
      background: #f7fafc;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .shot-label {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .shot-card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
      background: white;
    }
    .steps {
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 38px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .step {
      min-height: 74px;
      padding: 14px 16px;
      background: #f2f7ff;
      border-left: 5px solid var(--blue);
      border-radius: 14px;
      font-size: 18px;
      line-height: 1.45;
    }
    .footer {
      position: absolute;
      left: 56px;
      bottom: 14px;
      color: #98a2b3;
      font-size: 16px;
    }
    @media print {
      body { background: white; }
      .page {
        margin: 0;
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh;
        box-shadow: none;
        border-radius: 0;
        break-after: page;
      }
      @page { size: 16in 9in; margin: 0; }
    }
  </style>
</head>
<body>
  <section class="page">
    <span class="role">申请人｜PC 端</span>
    <h1>新增申请｜单 PC 端操作页示例</h1>
    <div class="pc-layout">
      <div class="shot-card">
        <div class="shot-label">PC 端截图</div>
        <img src="../screenshots/pc/create_apply.svg" alt="PC screenshot" />
      </div>
    </div>
    <div class="steps">
      <div class="step">1. 进入新增申请页面。</div>
      <div class="step">2. 填写基础信息和业务字段。</div>
      <div class="step">3. 核对页面数据是否完整。</div>
      <div class="step">4. 点击提交并确认结果。</div>
    </div>
    <div class="footer">Single PC operation page preview</div>
  </section>
</body>
</html>

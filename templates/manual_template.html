<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    :root {
      --blue: #1456b8;
      --deep: #0f2747;
      --muted: #6b7280;
      --bg: #eef3f8;
      --card: #ffffff;
      --line: #d8e1ec;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: #1f2937;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
    }
    .page {
      width: 1600px;
      height: 900px;
      margin: 28px auto;
      padding: 48px 56px;
      background: linear-gradient(180deg, #fff 0%, #f8fbff 100%);
      border-radius: 24px;
      box-shadow: 0 12px 36px rgba(15, 39, 71, .12);
      position: relative;
      overflow: hidden;
      page-break-after: always;
    }
    .page::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 9px;
      background: linear-gradient(90deg, var(--blue), #26a7df);
    }
    h1, h2, h3 { margin: 0; color: var(--deep); }
    h1 { font-size: 50px; line-height: 1.2; }
    h2 { font-size: 34px; line-height: 1.25; }
    p, li { font-size: 24px; line-height: 1.65; }
    .subtitle { margin-top: 24px; color: var(--muted); font-size: 26px; }
    .role {
      position: absolute;
      top: 46px;
      right: 56px;
      padding: 8px 18px;
      border-radius: 999px;
      color: var(--blue);
      background: #eaf2ff;
      font-size: 20px;
      font-weight: 700;
    }
    .content-card {
      margin-top: 42px;
      padding: 34px 42px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(15, 39, 71, .06);
    }
    .dual {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 28px;
      margin-top: 28px;
      height: 620px;
    }
    .shot-card {
      background: #f7fafc;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .shot-label {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .shot-card img {
      max-width: 100%;
      max-height: 100%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 12px;
      background: white;
    }
    .mobile-frame {
      align-items: center;
    }
    .mobile-frame img {
      width: auto;
      max-width: 100%;
      border: 10px solid #111827;
      border-radius: 34px;
    }
    .placeholder {
      flex: 1;
      min-height: 0;
      border: 3px dashed #aab6c5;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #778396;
      font-size: 28px;
      background: repeating-linear-gradient(-45deg, #f4f7fb, #f4f7fb 12px, #edf2f7 12px, #edf2f7 24px);
    }
    .steps {
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 38px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }
    .step {
      min-height: 74px;
      padding: 14px 16px;
      background: #f2f7ff;
      border-left: 5px solid var(--blue);
      border-radius: 14px;
      font-size: 18px;
      line-height: 1.45;
    }
    .confirm {
      position: absolute;
      right: 56px;
      bottom: 132px;
      padding: 8px 14px;
      border-radius: 10px;
      color: #92400e;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      font-size: 18px;
    }
    .footer {
      position: absolute;
      left: 56px;
      bottom: 14px;
      color: #98a2b3;
      font-size: 16px;
    }
    @media print {
      body { background: white; }
      .page {
        margin: 0;
        width: 100vw;
        height: 56.25vw;
        max-height: 100vh;
        box-shadow: none;
        border-radius: 0;
        break-after: page;
      }
      @page { size: 16in 9in; margin: 0; }
    }
  </style>
</head>
<body>
{{ sections }}
</body>
</html>
